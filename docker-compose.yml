# Gemini Web API — persistent cookies via volume + GEMINI_COOKIE_PATH per profile.
services:
  gemini-api:
    build: .
    image: gemini-api-standalone:local
    ports:
      - "${GEMINI_API_PORT:-8080}:8080"
    environment:
      GEMINI_PROFILES_ROOT: /data/profiles
      # Required: long random string. Protect this host with Cloudflare Access or a private network.
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in .env}
      # Optional: require this header on /v1/* in addition to Cloudflare (defense in depth)
      GEMINI_API_CLIENT_KEY: ${GEMINI_API_CLIENT_KEY:-}
    volumes:
      - gemini_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gemini_data:
