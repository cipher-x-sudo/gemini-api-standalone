# Gemini Web API + Cloudflare Tunnel (single file).
# Creates Docker network `gemini-prismacreative-net` automatically — no DOCKER_NETWORK env.
#
# Stop any OTHER cloudflared using the same TUNNEL_TOKEN before starting this stack.
#
# Up: docker compose --env-file .env up -d --build
#
# Cloudflare route for Gemini: http://gemini-api:9380
# For proxy.prismacreative.online → frontend:80, attach `frontend` to the same network (see README).

services:
  gemini-api:
    build: .
    image: gemini-api-standalone:local
    container_name: gemini-api
    ports:
      - "${GEMINI_API_PORT:-4000}:${GEMINI_INTERNAL_PORT:-9380}"
    environment:
      GEMINI_PROFILES_ROOT: /data/profiles
      GEMINI_INTERNAL_PORT: ${GEMINI_INTERNAL_PORT:-9380}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in .env}
      GEMINI_API_CLIENT_KEY: ${GEMINI_API_CLIENT_KEY:-}
      GEMINI_AUTO_ROTATE: ${GEMINI_AUTO_ROTATE:-true}
      GEMINI_REFRESH_INTERVAL_SECONDS: ${GEMINI_REFRESH_INTERVAL_SECONDS:-600}
      GEMINI_V1_DEFAULT_PROFILE: ${GEMINI_V1_DEFAULT_PROFILE:-default}
    volumes:
      - gemini_data:/data
    restart: unless-stopped
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:$$GEMINI_INTERNAL_PORT/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-gemini
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env (Zero Trust → Tunnels → Configure)}
    networks:
      - edge
    depends_on:
      - gemini-api

networks:
  edge:
    name: gemini-prismacreative-net
    driver: bridge

volumes:
  gemini_data:
