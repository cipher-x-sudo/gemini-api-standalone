# Gemini Web API + Cloudflare Tunnel (single file).
# gemini-api and cloudflared share one external Docker network with your other services (e.g. frontend).
#
# Prerequisites:
#   - Network must exist before `docker compose up` (e.g. created by your main stack, or: docker network create portico_default)
#   - Stop any OTHER cloudflared using the same TUNNEL_TOKEN (only one connector per tunnel).
#
# Up: docker compose --env-file .env up -d --build
#
# Cloudflare route for Gemini: http://gemini-api:9380 (internal port, not GEMINI_API_PORT)

services:
  gemini-api:
    build: .
    image: gemini-api-standalone:local
    container_name: gemini-api
    ports:
      - "${GEMINI_API_PORT:-4000}:${GEMINI_INTERNAL_PORT:-9380}"
    environment:
      GEMINI_PROFILES_ROOT: /data/profiles
      GEMINI_INTERNAL_PORT: ${GEMINI_INTERNAL_PORT:-9380}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in .env}
      GEMINI_API_CLIENT_KEY: ${GEMINI_API_CLIENT_KEY:-}
    volumes:
      - gemini_data:/data
    restart: unless-stopped
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:$$GEMINI_INTERNAL_PORT/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env (Zero Trust → Tunnels → Configure)}
    networks:
      - edge
    depends_on:
      - gemini-api

networks:
  edge:
    external: true
    name: ${DOCKER_NETWORK:?set DOCKER_NETWORK in .env e.g. portico_default}

volumes:
  gemini_data:
